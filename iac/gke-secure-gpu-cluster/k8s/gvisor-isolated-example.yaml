apiVersion: apps/v1
kind: Deployment
metadata:
  name: gvisor-echo
  namespace: alt-default
  labels:
    app: gvisor-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gvisor-echo
  template:
    metadata:
      labels:
        app: gvisor-echo
    spec:
      runtimeClassName: gvisor
      nodeSelector:
        workload-isolation: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -text=hello-from-gvisor
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: gvisor-echo
  namespace: alt-default
spec:
  selector:
    app: gvisor-echo
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: v1
kind: Pod
metadata:
  name: caller
  namespace: alt-default
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.12.1
      command:
        - sh
        - -c
        - sleep 3600
