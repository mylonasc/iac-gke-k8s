apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: telegram-service-default-deny
  namespace: telegram-gateway
spec:
  podSelector:
    matchLabels:
      app: telegram-service
  policyTypes:
    - Ingress
    - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: telegram-service-allow-selected-ingress
  namespace: telegram-gateway
spec:
  podSelector:
    matchLabels:
      app: telegram-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              telegram-gateway-access: "true"
      ports:
        - protocol: TCP
          port: 8000

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: telegram-service-egress
  namespace: telegram-gateway
spec:
  podSelector:
    matchLabels:
      app: telegram-service
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
