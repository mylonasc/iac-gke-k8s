apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-service-secrets
  namespace: telegram-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: telegram-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_SESSION_SECRET
      remoteRef:
        key: telegram-service-admin-session-secret
    - secretKey: GATEWAY_SECRET_MASTER_KEY
      remoteRef:
        key: telegram-service-gateway-secret-master-key
    - secretKey: ADMIN_USERNAME
      remoteRef:
        key: telegram-service-admin-username
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: telegram-service-admin-password
    - secretKey: TELEGRAM_API_ID
      remoteRef:
        key: telegram-service-telegram-api-id
    - secretKey: TELEGRAM_API_HASH
      remoteRef:
        key: telegram-service-telegram-api-hash
    - secretKey: WEBHOOK_SHARED_SECRET
      remoteRef:
        key: telegram-service-webhook-shared-secret
