apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandboxed-react-agent-frontend
  namespace: alt-default
  labels:
    app: sandboxed-react-agent-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandboxed-react-agent-frontend
  template:
    metadata:
      labels:
        app: sandboxed-react-agent-frontend
    spec:
      imagePullSecrets:
        - name: dockerhub-regcred
      containers:
        - name: frontend
          image: docker.io/mylonasc/magarathea:sandboxed-react-agent-frontend-0.5.0
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND_UPSTREAM
              value: sandboxed-react-agent-backend:80
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
