apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandboxed-react-agent-backend
  namespace: alt-default
  labels:
    app: sandboxed-react-agent-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: sandboxed-react-agent-backend
  template:
    metadata:
      labels:
        app: sandboxed-react-agent-backend
    spec:
      serviceAccountName: sandbox-workspace-admin-ksa
      tolerations:
        - key: purpose
          operator: Equal
          value: general-apps
          effect: NoSchedule
        - key: purpose
          operator: Equal
          value: general-apps-small
          effect: NoSchedule
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      imagePullSecrets:
        - name: dockerhub-regcred
      containers:
        - name: backend
          image: docker.io/mylonasc/magarathea:sandboxed-react-agent-backend-0.6.25
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandboxed-react-agent-secrets
                  key: openai-api-key
            - name: OPENAI_MODEL
              value: gpt-4o-mini
            - name: SANDBOX_MODE
              value: cluster
            - name: SESSION_STORE_PATH
              value: /app/data/sessions.db
            - name: ASSET_STORE_PATH
              value: /app/data/assets
            - name: APP_PUBLIC_BASE_PATH
              value: /sandboxed-react-agent
            - name: SANDBOX_API_URL
              value: http://sandbox-router-svc.alt-default.svc.cluster.local:8080
            - name: SANDBOX_TEMPLATE_NAME
              value: python-runtime-template-small
            - name: SANDBOX_NAMESPACE
              value: alt-default
            - name: SANDBOX_EXECUTION_MODEL
              value: session
            - name: GCP_PROJECT_ID
              value: gke-gpu-project-473410
            - name: SANDBOX_WORKSPACE_BUCKET_PREFIX
              value: magarathea-sandbox-workspace
            - name: SANDBOX_WORKSPACE_PROVISIONING_ENABLED
              value: "1"
            - name: SANDBOX_ALLOW_LOCAL_MODE
              value: "0"
            - name: SANDBOX_WORKSPACE_BASE_TEMPLATE_NAME
              value: python-runtime-template-small
            - name: SANDBOX_WORKSPACE_BASE_TEMPLATE_NAMES
              value: python-runtime-template-small,python-runtime-template,python-runtime-template-large,python-runtime-template-pydata
            - name: WORKSPACE_PROVISIONER_MAX_WORKERS
              value: "4"
            - name: SANDBOX_SESSION_IDLE_TTL_SECONDS
              value: "300"
            - name: SANDBOX_MAX_LEASE_TTL_SECONDS
              value: "1800"
            - name: SANDBOX_LEASE_REAPER_ENABLED
              value: "1"
            - name: SANDBOX_LEASE_REAPER_INTERVAL_SECONDS
              value: "15"
            - name: SANDBOX_PENDING_LEASE_REAPER_TTL_SECONDS
              value: "300"
            - name: AGENT_MAX_TOOL_CALLS_PER_TURN
              value: "4"
            - name: LOG_LEVEL
              value: INFO
            - name: LOG_FORMAT
              value: json
            - name: LOG_COMMAND_PREVIEW_CHARS
              value: "200"
            - name: AUTH_ENABLED
              value: "1"
            - name: AUTH_ISSUER
              valueFrom:
                secretKeyRef:
                  name: sandboxed-react-agent-secrets
                  key: auth-issuer
            - name: AUTH_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: sandboxed-react-agent-secrets
                  key: auth-audience
            - name: AUTH_JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: sandboxed-react-agent-secrets
                  key: auth-jwks-url
            - name: AUTH_EXEMPT_PATH_PREFIXES
              value: /api/health,/api/public/
            - name: AUTH_USER_ID_CLAIM
              value: sub
            - name: AUTHZ_POLICY_PATH
              value: /app/data/authz-policy.yaml
            - name: AUTHZ_POLICY_URL
              value: http://cluster-authz-manager-backend.alt-default.svc.cluster.local/api/apps/sandboxed-react-agent/policy/current
            - name: AUTHZ_REFRESH_INTERVAL_SECONDS
              value: "30"
            - name: AUTHZ_REMOTE_TIMEOUT_SECONDS
              value: "3"
            - name: OPS_ADMIN_EMAIL_ALLOWLIST
              value: mylonas.charilaos@gmail.com
            - name: OPS_ADMIN_GROUP_ALLOWLIST
              value: ""
            - name: OPS_ADMIN_USER_ID_ALLOWLIST
              value: ""
            - name: OPS_ADMIN_ALLOW_ALL_AUTHENTICATED
              value: "0"
            - name: ANON_IDENTITY_ENABLED
              value: "0"
            - name: ANON_IDENTITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: sandboxed-react-agent-secrets
                  key: anon-identity-secret
                  optional: true
            - name: ANON_IDENTITY_COOKIE_NAME
              value: sra_anon_uid
            - name: ANON_IDENTITY_COOKIE_SECURE
              value: "1"
            - name: ANON_IDENTITY_COOKIE_SAMESITE
              value: lax
            - name: TRACING_ENABLED
              value: "0"
            - name: TRACING_SAMPLE_RATIO
              value: "0.1"
            - name: OTEL_SERVICE_NAME
              value: sandboxed-react-agent-backend
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: ""
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: app-data
              mountPath: /app/data
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: sandboxed-react-agent-backend-data
