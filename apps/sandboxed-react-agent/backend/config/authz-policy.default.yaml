version: 1
default_roles:
  authenticated:
    - authenticated
  unauthenticated:
    - anonymous
role_mappings:
  groups:
    sra-admins:
      - ops_admin
    sra-pydata:
      - pydata_user
    sra-terminal:
      - terminal_user
roles:
  anonymous:
    capabilities:
      - terminal.open
      - sandbox.mode.cluster
      - sandbox.profile.transient
      - sandbox.execution_model.session
  authenticated:
    capabilities:
      - terminal.open
      - sandbox.mode.cluster
      - sandbox.profile.persistent_workspace
      - sandbox.profile.transient
      - sandbox.execution_model.session
      - sandbox.execution_model.ephemeral
      - sandbox.template.python-runtime-template-small
      - sandbox.template.python-runtime-template
      - sandbox.template.python-runtime-template-large
  terminal_user:
    capabilities:
      - terminal.open
  pydata_user:
    capabilities:
      - sandbox.template.python-runtime-template-pydata
  ops_admin:
    capabilities:
      - admin.ops.read
      - admin.ops.write
      - authz.policy.manage
feature_rules:
  terminal.open:
    any_capabilities:
      - terminal.open
  admin.ops.read:
    any_capabilities:
      - admin.ops.read
  admin.ops.write:
    any_capabilities:
      - admin.ops.write
  authz.policy.manage:
    any_capabilities:
      - authz.policy.manage
sandbox_rules:
  templates:
    python-runtime-template-pydata:
      any_capabilities:
        - sandbox.template.python-runtime-template-pydata
  modes:
    cluster: {}
    local:
      any_capabilities:
        - sandbox.mode.local
  profiles:
    persistent_workspace:
      any_capabilities:
        - sandbox.profile.persistent_workspace
    transient:
      any_capabilities:
        - sandbox.profile.transient
  execution_models:
    session:
      any_capabilities:
        - sandbox.execution_model.session
    ephemeral:
      any_capabilities:
        - sandbox.execution_model.ephemeral
