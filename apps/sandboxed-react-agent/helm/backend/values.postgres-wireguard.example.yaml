# Example Helm overrides for postgres + WireGuard sidecar mode.

database:
  type: postgres
  postgres:
    host: postgres-db-svc
    port: 5432
    name: sandboxed_agent
    secretName: sandboxed-react-agent-db-credentials
    wireguard:
      enabled: true
      image: linuxserver/wireguard:latest
      secretName: wg-config
      onPremIp: 10.8.0.4
