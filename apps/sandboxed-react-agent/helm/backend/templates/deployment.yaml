apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sandboxed-react-agent-backend.fullname" . }}
  labels:
    {{- include "sandboxed-react-agent-backend.labels" . | nindent 4 }}
    app: {{ include "sandboxed-react-agent-backend.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: {{ include "sandboxed-react-agent-backend.fullname" . }}
  template:
    metadata:
      labels:
        {{- include "sandboxed-react-agent-backend.selectorLabels" . | nindent 8 }}
        app: {{ include "sandboxed-react-agent-backend.fullname" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_TYPE
              value: {{ .Values.database.type | quote }}
            - name: DB_HOST
              value: {{ .Values.database.postgres.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.postgres.name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgres.secretName }}
                  key: username
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgres.secretName }}
                  key: password
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.openai.secretName }}
                  key: {{ .Values.app.openai.apiKeyKey }}
            - name: OPENAI_MODEL
              value: {{ .Values.app.openai.model | quote }}
            - name: SANDBOX_MODE
              value: {{ .Values.app.sandbox.mode | quote }}
            - name: SESSION_STORE_PATH
              value: {{ .Values.database.sqlite.path | quote }}
            - name: ASSET_STORE_PATH
              value: "/app/data/assets"
            - name: APP_PUBLIC_BASE_PATH
              value: "/sandboxed-react-agent"
            - name: SANDBOX_API_URL
              value: {{ .Values.app.sandbox.apiUrl | quote }}
            - name: SANDBOX_TEMPLATE_NAME
              value: {{ .Values.app.sandbox.templateName | quote }}
            - name: SANDBOX_NAMESPACE
              value: {{ .Values.app.sandbox.namespace | quote }}
            - name: SANDBOX_EXECUTION_MODEL
              value: {{ .Values.app.sandbox.executionModel | quote }}
            - name: GCP_PROJECT_ID
              value: {{ .Values.global.gcpProjectId | quote }}
            - name: SANDBOX_WORKSPACE_BUCKET_PREFIX
              value: {{ .Values.app.sandbox.bucketPrefix | quote }}
            - name: SANDBOX_WORKSPACE_PROVISIONING_ENABLED
              value: {{ .Values.app.sandbox.provisioningEnabled | quote }}
            - name: SANDBOX_ALLOW_LOCAL_MODE
              value: {{ .Values.app.sandbox.allowLocalMode | quote }}
            - name: SANDBOX_WORKSPACE_BASE_TEMPLATE_NAME
              value: {{ .Values.app.sandbox.workspaceBaseTemplateName | quote }}
            - name: SANDBOX_WORKSPACE_BASE_TEMPLATE_NAMES
              value: {{ .Values.app.sandbox.workspaceBaseTemplateNames | quote }}
            - name: WORKSPACE_PROVISIONER_MAX_WORKERS
              value: {{ .Values.app.sandbox.maxWorkers | quote }}
            - name: SANDBOX_SESSION_IDLE_TTL_SECONDS
              value: {{ .Values.app.sandbox.idleTtlSeconds | quote }}
            - name: SANDBOX_MAX_LEASE_TTL_SECONDS
              value: {{ .Values.app.sandbox.maxLeaseTtlSeconds | quote }}
            - name: SANDBOX_LEASE_REAPER_ENABLED
              value: {{ .Values.app.sandbox.reaperEnabled | quote }}
            - name: SANDBOX_LEASE_REAPER_INTERVAL_SECONDS
              value: {{ .Values.app.sandbox.reaperIntervalSeconds | quote }}
            - name: SANDBOX_PENDING_LEASE_REAPER_TTL_SECONDS
              value: {{ .Values.app.sandbox.pendingReaperTtlSeconds | quote }}
            - name: AGENT_MAX_TOOL_CALLS_PER_TURN
              value: "4"
            - name: LOG_LEVEL
              value: {{ .Values.app.logging.level | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.app.logging.format | quote }}
            - name: LOG_COMMAND_PREVIEW_CHARS
              value: {{ .Values.app.logging.commandPreviewChars | quote }}
            - name: AUTH_ENABLED
              value: {{ .Values.app.auth.enabled | quote }}
            - name: AUTH_ISSUER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.auth.secretName }}
                  key: {{ .Values.app.auth.issuerKey }}
            - name: AUTH_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.auth.secretName }}
                  key: {{ .Values.app.auth.audienceKey }}
            - name: AUTH_JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.auth.secretName }}
                  key: {{ .Values.app.auth.jwksUrlKey }}
            - name: AUTH_EXEMPT_PATH_PREFIXES
              value: {{ .Values.app.auth.exemptPathPrefixes | quote }}
            - name: AUTH_USER_ID_CLAIM
              value: {{ .Values.app.auth.userIdClaim | quote }}
            - name: AUTHZ_POLICY_PATH
              value: {{ .Values.app.authz.policyPath | quote }}
            - name: AUTHZ_POLICY_URL
              value: {{ .Values.app.authz.policyUrl | quote }}
            - name: AUTHZ_REFRESH_INTERVAL_SECONDS
              value: {{ .Values.app.authz.refreshIntervalSeconds | quote }}
            - name: AUTHZ_REMOTE_TIMEOUT_SECONDS
              value: {{ .Values.app.authz.remoteTimeoutSeconds | quote }}
            - name: OPS_ADMIN_EMAIL_ALLOWLIST
              value: {{ .Values.app.ops.adminEmailAllowlist | quote }}
            - name: OPS_ADMIN_GROUP_ALLOWLIST
              value: {{ .Values.app.ops.adminGroupAllowlist | quote }}
            - name: OPS_ADMIN_USER_ID_ALLOWLIST
              value: {{ .Values.app.ops.adminUserIdAllowlist | quote }}
            - name: OPS_ADMIN_ALLOW_ALL_AUTHENTICATED
              value: {{ .Values.app.ops.allowAllAuthenticated | quote }}
            - name: ANON_IDENTITY_ENABLED
              value: {{ .Values.app.anon.enabled | quote }}
            - name: ANON_IDENTITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.anon.secretName }}
                  key: {{ .Values.app.anon.secretKey }}
                  optional: true
            - name: ANON_IDENTITY_COOKIE_NAME
              value: {{ .Values.app.anon.cookieName | quote }}
            - name: ANON_IDENTITY_COOKIE_SECURE
              value: {{ .Values.app.anon.cookieSecure | quote }}
            - name: ANON_IDENTITY_COOKIE_SAMESITE
              value: {{ .Values.app.anon.sameSite | quote }}
            - name: TRACING_ENABLED
              value: {{ .Values.app.tracing.enabled | quote }}
            - name: TRACING_SAMPLE_RATIO
              value: {{ .Values.app.tracing.sampleRatio | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.app.tracing.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.app.tracing.otlpEndpoint | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: app-data
              mountPath: /app/data
        {{- if and (eq .Values.database.type "postgres") .Values.database.postgres.wireguard.enabled }}
        # --- WIREGUARD NETWORK SIDECAR ---
        - name: wg-sidecar
          image: {{ .Values.database.postgres.wireguard.image }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: false
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: wg-config-volume
              mountPath: /config/wg_confs/wg0.conf
              subPath: wg0.conf
              readOnly: true
            - name: host-modules
              mountPath: /lib/modules
              readOnly: true
        {{- end }}
      volumes:
        - name: app-data
          {{- if and (eq .Values.database.type "sqlite") .Values.database.sqlite.pvc.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.database.sqlite.pvc.claimName }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if and (eq .Values.database.type "postgres") .Values.database.postgres.wireguard.enabled }}
        - name: wg-config-volume
          secret:
            secretName: {{ .Values.database.postgres.wireguard.secretName }}
            defaultMode: 0600
        - name: host-modules
          hostPath:
            path: /lib/modules
        {{- end }}
