apiVersion: v1
kind: Service
metadata:
  name: {{ include "sandboxed-react-agent-backend.fullname" . }}
  labels:
    {{- include "sandboxed-react-agent-backend.labels" . | nindent 4 }}
    app: {{ include "sandboxed-react-agent-backend.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: {{ include "sandboxed-react-agent-backend.fullname" . }}
