services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AGENT_MAX_TOOL_CALLS_PER_TURN: ${AGENT_MAX_TOOL_CALLS_PER_TURN:-4}
      SANDBOX_MODE: ${SANDBOX_MODE:-local}
      SANDBOX_API_URL: ${SANDBOX_API_URL:-http://host.docker.internal:8080}
      SANDBOX_TEMPLATE_NAME: ${SANDBOX_TEMPLATE_NAME:-python-runtime-template}
      SANDBOX_NAMESPACE: ${SANDBOX_NAMESPACE:-alt-default}
      SANDBOX_SERVER_PORT: ${SANDBOX_SERVER_PORT:-8888}
      SANDBOX_MAX_OUTPUT_CHARS: ${SANDBOX_MAX_OUTPUT_CHARS:-6000}
      SANDBOX_LOCAL_TIMEOUT_SECONDS: ${SANDBOX_LOCAL_TIMEOUT_SECONDS:-20}
    expose:
      - "8000"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_UPSTREAM: backend:8000
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  backend_data:
