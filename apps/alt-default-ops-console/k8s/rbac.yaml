apiVersion: v1
kind: ServiceAccount
metadata:
  name: alt-default-ops-controller
  namespace: alt-default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alt-default-ops-controller
  namespace: alt-default
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxclaims"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxtemplates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxwarmpools"]
    verbs: ["create", "get", "list", "watch", "patch", "update"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alt-default-ops-controller
  namespace: alt-default
subjects:
  - kind: ServiceAccount
    name: alt-default-ops-controller
    namespace: alt-default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alt-default-ops-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alt-default-ops-controller-nodes
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alt-default-ops-controller-nodes
subjects:
  - kind: ServiceAccount
    name: alt-default-ops-controller
    namespace: alt-default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alt-default-ops-controller-nodes
