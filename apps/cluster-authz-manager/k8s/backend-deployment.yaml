apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cluster-authz-manager-data
  namespace: alt-default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-authz-manager-backend
  namespace: alt-default
spec:
  selector:
    app: cluster-authz-manager-backend
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-authz-manager-backend
  namespace: alt-default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-authz-manager-backend
  template:
    metadata:
      labels:
        app: cluster-authz-manager-backend
    spec:
      imagePullSecrets:
        - name: dockerhub-regcred
      tolerations:
        - key: purpose
          operator: Equal
          value: general-apps
          effect: NoSchedule
        - key: purpose
          operator: Equal
          value: general-apps-small
          effect: NoSchedule
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: backend
          image: docker.io/mylonasc/magarathea:cluster-authz-manager-backend-0.1.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "sqlite:////app/data/authz-manager.db"
            - name: DEX_JWKS_URL
              value: "http://dex.dex.svc.cluster.local:5556/keys"
            - name: AUTH_ENABLED
              value: "true"
            - name: BOOTSTRAP_ADMIN_EMAIL
              value: "mylonas.charilaos@gmail.com"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cluster-authz-manager-data
