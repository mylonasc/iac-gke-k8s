services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite:////app/data/authz-manager.db
      - DEX_JWKS_URL=${DEX_JWKS_URL:-http://host.docker.internal:5556/keys}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - backend_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - BACKEND_UPSTREAM=http://backend:8000
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
