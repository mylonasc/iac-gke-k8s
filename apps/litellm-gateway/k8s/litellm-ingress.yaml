apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm-gateway
  namespace: llm-gateway
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - http:
        paths:
          - path: /litellm
            pathType: Prefix
            backend:
              service:
                name: litellm-gateway
                port:
                  number: 4000
