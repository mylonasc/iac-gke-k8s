apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-gateway
  namespace: llm-gateway
  labels:
    app: litellm-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-gateway
  template:
    metadata:
      labels:
        app: litellm-gateway
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-v1.82.3-stable@sha256:b959a1816fa454a14d2842242d0fa1cd0d39f96fc94d3a1f4e1de4e48e2398c6
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /app/config/config.yaml
            - --port
            - "4000"
            - --num_workers
            - "2"
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-gateway-secrets
                  key: openai-api-key
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-gateway-secrets
                  key: litellm-master-key
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config
