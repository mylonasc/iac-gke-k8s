apiVersion: v1
kind: Namespace
metadata:
  name: dex
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: dex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          imagePullPolicy: IfNotPresent
          args:
            - dex
            - serve
            - /etc/dex/config/config.yaml
          ports:
            - name: http
              containerPort: 5556
            - name: metrics
              containerPort: 5558
          readinessProbe:
            httpGet:
              path: /dex/healthz
              port: 5556
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /dex/healthz
              port: 5556
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: dex-config
              mountPath: /etc/dex/config
              readOnly: true
            - name: dex-data
              mountPath: /var/dex
      volumes:
        - name: dex-config
          secret:
            secretName: dex-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: dex-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: dex
spec:
  selector:
    app: dex
  ports:
    - name: http
      port: 5556
      targetPort: 5556
