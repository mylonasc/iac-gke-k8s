apiVersion: v1
kind: Namespace
metadata:
  name: dex
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: dex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      initContainers:
        - name: prepare-dex-data
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ceu
            - |
              mkdir -p /var/dex
              chmod 0777 /var/dex
          volumeMounts:
            - name: dex-data
              mountPath: /var/dex
        - name: render-dex-config
          image: mikefarah/yq:4.44.3
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ceu
            - |
              base=/etc/dex/base-config/config.yaml
              static=/etc/dex/static-passwords/static-passwords.yaml
              out=/etc/dex/rendered/config.yaml
              if [ -s "$static" ]; then
                yq eval-all 'select(fileIndex == 0) * {"enablePasswordDB": true, "staticPasswords": select(fileIndex == 1)}' "$base" "$static" > "$out"
              else
                cp "$base" "$out"
              fi
          volumeMounts:
            - name: dex-base-config
              mountPath: /etc/dex/base-config
              readOnly: true
            - name: dex-static-passwords
              mountPath: /etc/dex/static-passwords
              readOnly: true
            - name: dex-rendered-config
              mountPath: /etc/dex/rendered
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          imagePullPolicy: IfNotPresent
          args:
            - dex
            - serve
            - /etc/dex/rendered/config.yaml
          ports:
            - name: http
              containerPort: 5556
            - name: metrics
              containerPort: 5558
          readinessProbe:
            httpGet:
              path: /dex/healthz
              port: 5556
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /dex/healthz
              port: 5556
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: dex-rendered-config
              mountPath: /etc/dex/rendered
              readOnly: true
            - name: dex-data
              mountPath: /var/dex
      volumes:
        - name: dex-base-config
          secret:
            secretName: dex-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: dex-static-passwords
          secret:
            secretName: dex-static-passwords
            optional: true
            items:
              - key: static-passwords.yaml
                path: static-passwords.yaml
        - name: dex-rendered-config
          emptyDir: {}
        - name: dex-data
          persistentVolumeClaim:
            claimName: dex-data
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: dex
spec:
  selector:
    app: dex
  ports:
    - name: http
      port: 5556
      targetPort: 5556
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dex-data
  namespace: dex
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard-rwo
