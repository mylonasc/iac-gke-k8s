{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app.name }}-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- if .Values.auth.enabled }}
    nginx.ingress.kubernetes.io/auth-url: {{ .Values.auth.url | quote }}
    nginx.ingress.kubernetes.io/auth-signin: {{ .Values.auth.signin | quote }}
    nginx.ingress.kubernetes.io/auth-response-headers: {{ .Values.auth.responseHeaders | quote }}
    {{- end }}
spec:
  tls:
  - hosts: [{{ .Values.ingress.host | quote }}]
    secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
  - host: {{ .Values.ingress.host | quote }}
    http:
      paths:
      - path: {{ .Values.ingress.path }}
        pathType: {{ .Values.ingress.pathType }}
        backend:
          service:
            name: {{ .Values.service.name }}
            port:
              number: {{ .Values.service.port }}
{{- end }}
