apiVersion: v1
kind: Namespace
metadata:
  name: app-hello
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-hello-website
  namespace: app-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - name: hello-web
        image: gcr.io/google-samples/hello-app:1.0
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: my-hello-service
  namespace: app-hello
spec:
  selector:
    app: hello
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-website-ingress
  namespace: app-hello
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Auth Annotations pointing to the oauth2-proxy in the other namespace
    nginx.ingress.kubernetes.io/auth-url: "https://$host/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=$escaped_request_uri"
    
    # Optional: Pass user headers to the app
    nginx.ingress.kubernetes.io/auth-response-headers: "x-auth-request-user,x-auth-request-email"
spec:
  tls:
  - hosts:
    - magarathea.ddns.net
    secretName: magarathea-ddns-net-tls
  rules:
  - host: magarathea.ddns.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-hello-service
            port:
              number: 80
