apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          imagePullPolicy: IfNotPresent
          args:
            # Core
            - --provider=google
            - --http-address=0.0.0.0:4180

            # Must match your Google OAuth "Authorized redirect URI"
            - --redirect-url=https://magarathea.ddns.net/oauth2/callback

            # Where nginx will call to validate a request
            # (oauth2-proxy provides /oauth2/auth automatically)
            - --email-domain=*

            # If you only want your own domain:
            # - --email-domain=yourcompany.com

            # Cookies / security
            - --cookie-secure=true
            - --cookie-httponly=true
            - --cookie-samesite=lax

            # Helpful headers to upstream / nginx
            - --set-authorization-header=true
            - --pass-access-token=true
            - --pass-user-headers=true

            # Usually good defaults
            - --cookie-refresh=1h
            - --cookie-expire=8h

            # (Optional but recommended when behind reverse proxies)
            - --reverse-proxy=true

          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 80
      targetPort: 4180
